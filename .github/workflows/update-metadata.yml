---
name: Update Metadata
concurrency: jimeh/emacs-builds/update-metadata
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meta branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: meta
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.23"
      - name: update total downloads shield JSON
        run: >-
          go run . badges downloads
          --output total-downloads/shield.json
          --cache total-downloads/.cache.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: commit and push changes to meta branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add total-downloads/shield.json total-downloads/.cache.json
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
            exit 0
          fi
          git commit -m "chore(meta): update metadata files"
          git push "$AUTHENTICATED_REMOTE" HEAD:meta
        env:
          AUTHENTICATED_REMOTE: >-
            https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
