---
# Requires _prepare.yml re-usable workflow to have run.
name: _build_emacs
on:
  workflow_call:
    inputs:
      builder_ref:
        description: Git ref of build-emacs-for-macos to use
        type: string
        required: true
      os:
        description: GitHub Actions runner OS
        type: string
        required: false
        default: "macos-15"
      build_os:
        description: Target OS to build for
        type: string
        required: false
        default: "macos-15"
      artifact_prefix:
        description: Artifact prefix for build_os
        type: string
        required: false
      git_ref:
        description: Git ref to build
        type: string
        required: true
      git_sha:
        description: Override git SHA to build
        type: string
        required: false
      build_args:
        description: Custom arguments passed to build script
        type: string
        required: false
      build_variant:
        description: "Optional build number used as version suffix"
        type: string
        required: false
      test_build_name:
        description: "Test build name"
        type: string
        required: false
      test_release_type:
        description: "prerelease or draft"
        type: string
        required: false
        default: "prerelease"
    outputs:
      package_created:
        description: "Whether or not a package was created"
        value: ${{ jobs.package.outputs.package_created }}
    secrets:
      AC_PASSWORD:
        required: true
      AC_PROVIDER:
        required: true
      AC_USERNAME:
        required: true
      APPLE_DEVELOPER_CERTIFICATE_P12_BASE64:
        required: true
      APPLE_DEVELOPER_CERTIFICATE_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  plan:
    runs-on: ${{ inputs.build_os }}
    outputs:
      check: ${{ steps.check.outputs.result }}
    steps:
      - name: Checkout build-emacs-for-macos repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jimeh/build-emacs-for-macos
          ref: ${{ inputs.builder_ref }}
          persist-credentials: false
      - name: Download pre-built emacs-builder artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: emacs-builder-${{ runner.arch }}
          path: bin
      - name: Ensure emacs-builder is executable
        run: chmod +x bin/emacs-builder
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.arch }}-${{ hashFiles('**/flake.*') }}
      - name: Install dependencies
        run: nix develop --command nix flake metadata
      - name: Plan build
        run: |
          args=()

          if [ -n "$BUILD_VARIANT" ]; then
            args+=(--build-variant "$BUILD_VARIANT")
          fi

          if [ -n "$TEST_BUILD_NAME" ]; then
            args+=(
              --test-build "$TEST_BUILD_NAME"
              --test-release-type "$TEST_RELEASE_TYPE"
            )
          fi

          if [ -n "$GIT_SHA" ]; then
            args+=(--sha "$GIT_SHA")
          fi

          args+=("$GIT_REF")

          nix develop --command \
            bin/emacs-builder -l debug plan --output build-plan.yml \
            --output-dir "$GITHUB_WORKSPACE/builds" \
            "${args[@]}"
        env:
          BUILD_VARIANT: ${{ inputs.build_variant }}
          GITHUB_TOKEN: ${{ github.token }}
          GIT_REF: ${{ inputs.git_ref }}
          GIT_SHA: ${{ inputs.git_sha }}
          TEST_BUILD_NAME: ${{ inputs.test_build_name }}
          TEST_RELEASE_TYPE: ${{ inputs.test_release_type }}
      - name: Show plan
        run: cat build-plan.yml
      - name: Upload build-plan artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_prefix }}build-plan
          path: build-plan.yml
          if-no-files-found: error
      - name: Check if planned release and asset already exist
        id: check
        continue-on-error: true
        run: |
          if bin/emacs-builder -l debug release --plan build-plan.yml check; then
            echo "result=ok" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: echo 'Planned release already seems to exist.'
        if: steps.check.outputs.result == 'ok'

  build:
    runs-on: ${{ inputs.build_os }}
    needs: [plan]
    # Only run if check for existing release and asset failed.
    if: needs.plan.outputs.check == 'fail'
    steps:
      - name: Checkout build-emacs-for-macos repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jimeh/build-emacs-for-macos
          ref: ${{ inputs.builder_ref }}
          path: builder
          persist-credentials: false
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.arch }}-${{ hashFiles('**/flake.*') }}
      - name: Download build-plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact_prefix }}build-plan
          path: ./builder/
      - name: Install dependencies
        run: nix develop --command nix flake metadata
        working-directory: builder
      - name: Install Ruby dependencies
        run: >-
          nix develop --command make bootstrap-ruby
        working-directory: builder
        env:
          BUNDLE_WITHOUT: "development"
      - name: Build Emacs
        run: |
          args=()

          if [ -n "$BUILD_ARGS" ]; then
            read -r -a args <<< "$BUILD_ARGS"
          fi

          nix develop \
            --command ./build-emacs-for-macos \
            --log-level debug \
            --plan build-plan.yml \
            --native-full-aot \
            --no-self-sign \
            --icon-uri "$ICON_URI" \
            --tahoe-icon-uri "$TAHOE_ICON_URI" \
            --tahoe-icon-name EmacsLG1 \
            "${args[@]}"
        working-directory: builder
        env:
          BUILD_ARGS: ${{ inputs.build_args }}
          GITHUB_TOKEN: ${{ github.token }}
          ICON_URI: >-
            https://github.com/jimeh/emacs-liquid-glass-icons/releases/download/v1.0.1/EmacsLG1-Default.icns
          TAHOE_ICON_URI: >-
            https://github.com/jimeh/emacs-liquid-glass-icons/releases/download/v1.0.1/Assets.car
      - name: Upload unsigned app artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_prefix }}unsigned-app
          path: builds/*.tbz
          if-no-files-found: error
      - name: Upload Emacs source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_prefix }}emacs-source
          path: builder/tarballs/*.tgz

  package:
    runs-on: ${{ inputs.os }}
    needs: [plan, build]
    outputs:
      package_created: ${{ steps.package_created.outputs.package_created }}
    steps:
      - name: Download pre-built emacs-builder artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: emacs-builder-${{ runner.arch }}
          path: bin
      - name: Ensure emacs-builder is executable
        run: chmod +x bin/emacs-builder
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install dmgbuild
        run: |
          $(command -v pip3 || command -v pip) install --upgrade dmgbuild
      - name: Download build-plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact_prefix }}build-plan
          path: ./
      - name: Download unsigned app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact_prefix }}unsigned-app
          path: builds
      - name: Extract unsigned app archive
        run: |
          find . -name '*.tbz' -exec tar xvjf "{}" \;
        working-directory: builds
      - name: Install the Apple signing certificate
        run: |
          # create variables
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # import certificate and provisioning profile from secrets
          echo -n "$CERT_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # import certificate to keychain
          security import "$CERTIFICATE_PATH" -P "$CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # discover the imported Developer ID Application identity
          if [ -z "$AC_PROVIDER" ]; then
            echo "AC_PROVIDER is required for signing identity discovery" >&2
            exit 1
          fi

          SIGN_IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" |
              awk -v team="($AC_PROVIDER)" '
                /Developer ID Application/ && index($0, team) {
                  print $2
                  exit
                }
              '
          )"

          if [ -z "$SIGN_IDENTITY" ]; then
            echo "No Developer ID Application identity found in keychain" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "AC_SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "Discovered signing identity: ${SIGN_IDENTITY:0:8}..."
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          AC_PROVIDER: ${{ secrets.AC_PROVIDER }}
      - name: Sign, package and notarize build
        run: >-
          bin/emacs-builder package -v --plan build-plan.yml
          --sign --remove-source-dir
        env:
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_PROVIDER: ${{ secrets.AC_PROVIDER }}
      - name: Upload disk image artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_prefix }}dmg
          path: |
            builds/*.dmg
            builds/*.sha*
          if-no-files-found: error
      - name: Set package created output
        id: package_created
        run: echo "package_created=true" >> "$GITHUB_OUTPUT"
      - name: Clean up keychain used for signing certificate
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db"
